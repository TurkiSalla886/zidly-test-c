<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zidly — TEST C</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.4rem;
      color: #38bdf8;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 20px;
    }
    .status-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .status-box h2 {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 10px;
    }
    .item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #1e293b;
      font-size: 0.88rem;
    }
    .item:last-child { border-bottom: none; }
    .badge {
      display: inline-block;
      min-width: 22px;
      text-align: center;
      font-size: 1rem;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .label { flex: 1; }
    .value {
      color: #94a3b8;
      font-size: 0.8rem;
      font-family: monospace;
      max-width: 220px;
      word-break: break-all;
      text-align: left;
    }
    .pass  { color: #4ade80; }
    .fail  { color: #f87171; }
    .wait  { color: #facc15; }
    .info  { color: #94a3b8; }
    #sdk-status {
      font-size: 1.1rem;
      font-weight: bold;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 14px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      color: #93c5fd;
    }
    #sdk-status.ready   { background: #14532d; border-color: #22c55e; color: #86efac; }
    #sdk-status.error   { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
    #log {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 0.78rem;
      color: #64748b;
      max-height: 180px;
      overflow-y: auto;
    }
    #log .lg { color: #4ade80; }
    #log .lw { color: #facc15; }
    #log .le { color: #f87171; }
  </style>
</head>
<body>

  <h1>🧪 Zidly — TEST C</h1>
  <p class="subtitle">اختبار Embedded SDK داخل iframe سلة</p>

  <!-- حالة الـ SDK — أهم عنصر في الصفحة -->
  <div id="sdk-status">⏳ جاري تهيئة SDK...</div>

  <!-- نتائج الاختبارات -->
  <div class="status-box">
    <h2>نتائج الفحوصات التلقائية</h2>

    <div class="item">
      <span class="badge" id="r-env">⏳</span>
      <span class="label">البيئة</span>
      <span class="value" id="v-env">—</span>
    </div>

    <div class="item">
      <span class="badge" id="r-sdk-load">⏳</span>
      <span class="label">تحميل SDK</span>
      <span class="value" id="v-sdk-load">—</span>
    </div>

    <div class="item">
      <span class="badge" id="r-sdk-init">⏳</span>
      <span class="label">init() handshake</span>
      <span class="value" id="v-sdk-init">—</span>
    </div>

    <div class="item">
      <span class="badge" id="r-token">⏳</span>
      <span class="label">Access Token</span>
      <span class="value" id="v-token">—</span>
    </div>

    <div class="item">
      <span class="badge" id="r-merchant">⏳</span>
      <span class="label">Merchant ID</span>
      <span class="value" id="v-merchant">—</span>
    </div>

    <div class="item">
      <span class="badge" id="r-latency">⏳</span>
      <span class="label">CDN Latency</span>
      <span class="value" id="v-latency">—</span>
    </div>

    <div class="item">
      <span class="badge" id="r-pm">⏳</span>
      <span class="label">postMessage events</span>
      <span class="value" id="v-pm">—</span>
    </div>
  </div>

  <!-- سجل الأحداث -->
  <div class="status-box">
    <h2>سجل الأحداث (Log)</h2>
    <div id="log"></div>
  </div>

  <script>
    // ─── أدوات مساعدة ──────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const t0 = Date.now();

    function log(msg, type = '') {
      const el = $('log');
      const line = document.createElement('div');
      line.className = type;
      line.textContent = `[${Date.now() - t0}ms] ${msg}`;
      el.prepend(line);    // أحدث في الأعلى
    }

    function setResult(id, icon, value, cls) {
      const badge = $(`r-${id}`);
      const val   = $(`v-${id}`);
      badge.textContent = icon;
      badge.className   = `badge ${cls}`;
      if (val) val.textContent = value;
    }

    function setSdkStatus(text, cls) {
      const el = $('sdk-status');
      el.textContent = text;
      el.className   = cls;
    }

    // ─── فحص البيئة ───────────────────────────────────────────────
    const isInsideIframe = window !== window.parent;
    setResult('env', isInsideIframe ? '✅' : '⚠️',
              isInsideIframe ? 'داخل iframe سلة' : 'خارج iframe (browser مباشر)',
              isInsideIframe ? 'pass' : 'wait');
    log(`البيئة: ${isInsideIframe ? 'iframe' : 'browser مباشر'}`);

    // ─── مراقبة postMessage من سلة ────────────────────────────────
    const pmEvents = [];
    window.addEventListener('message', e => {
      pmEvents.push({ origin: e.origin, type: e.data?.type || JSON.stringify(e.data).slice(0,40) });
      log(`postMessage ← ${e.origin} | ${e.data?.type || '?'}`, 'lg');
      setResult('pm', '✅', `${pmEvents.length} event(s)`, 'pass');
    });
    // بعد 3 ثوانٍ إذا لم يصلنا شيء
    setTimeout(() => {
      if (pmEvents.length === 0) {
        setResult('pm', '⚠️', 'لم تصل أي events', 'wait');
        log('لا توجد postMessage events خلال 3 ثوانٍ', 'lw');
      }
    }, 3000);

    // ─── تحميل الـ SDK ثم init() فوراً ───────────────────────────
    const sdkUrl = 'https://cdn.jsdelivr.net/npm/@salla.sa/embedded-sdk';
    const cdnStart = Date.now();

    log(`جاري تحميل SDK من CDN...`);
    setResult('sdk-load', '⏳', 'يحمّل...', 'wait');

    const script = document.createElement('script');
    script.src = sdkUrl;

    script.onload = async () => {
      const latency = Date.now() - cdnStart;
      setResult('latency', '✅', `${latency}ms`, latency < 500 ? 'pass' : 'wait');
      log(`SDK تحمّل في ${latency}ms`, 'lg');

      // تحقق من وجود الـ global
      const sdk = window.SallaEmbeddedSDK;
      if (!sdk) {
        setResult('sdk-load', '❌', 'window.SallaEmbeddedSDK غير موجود', 'fail');
        setSdkStatus('❌ SDK غير موجود في window', 'error');
        log('خطأ: window.SallaEmbeddedSDK = undefined', 'le');
        return;
      }

      setResult('sdk-load', '✅', `v${sdk.version || 'unknown'}`, 'pass');
      log(`SDK جاهز — global: window.SallaEmbeddedSDK`, 'lg');

      // ─── INIT — الخطوة الأهم: Handshake مع سلة ─────────────────
      log('جاري استدعاء SallaEmbeddedSDK.init()...');
      setSdkStatus('⏳ جاري إرسال handshake لسلة...', '');

      try {
        // init() يرسل postMessage لسلة ليُزيل الـ skeleton ويؤكد الاتصال
        const result = await sdk.init();

        log(`init() نجح — النتيجة: ${JSON.stringify(result || 'ok')}`, 'lg');
        setResult('sdk-init', '✅', 'handshake ناجح', 'pass');
        setSdkStatus('✅ TEST C نجح — الاتصال مع سلة مؤكد!', 'ready');

        // ─── استخراج Token و Merchant بعد init ──────────────────
        try {
          const token = sdk.getToken?.() || sdk.token || sdk.accessToken;
          if (token) {
            setResult('token', '✅', token.slice(0,20) + '…', 'pass');
            log(`Access Token: ${token.slice(0,20)}...`, 'lg');
          } else {
            setResult('token', '⚠️', 'لا يوجد token — EasyMode؟', 'wait');
            log('token غير متاح مباشرة (Easy Mode — يأتي عبر webhook)', 'lw');
          }
        } catch(e) {
          setResult('token', '⚠️', 'getToken() رمى خطأ', 'wait');
          log(`getToken error: ${e.message}`, 'lw');
        }

        try {
          const merchant = sdk.getMerchant?.() || sdk.merchant || sdk.store;
          if (merchant) {
            const mid = merchant.id || merchant.store_id || JSON.stringify(merchant).slice(0,30);
            setResult('merchant', '✅', mid, 'pass');
            log(`Merchant: ${mid}`, 'lg');
          } else {
            setResult('merchant', '⚠️', 'getMerchant() فارغ', 'wait');
            log('merchant info غير متاح مباشرة', 'lw');
          }
        } catch(e) {
          setResult('merchant', '⚠️', 'getMerchant() رمى خطأ', 'wait');
          log(`getMerchant error: ${e.message}`, 'lw');
        }

      } catch (err) {
        // init() فشل — يعني سلة لم تقبل الـ handshake
        setResult('sdk-init', '❌', err.message || 'init() فشل', 'fail');
        setSdkStatus('❌ Handshake فشل — سلة لم تقبل الاتصال', 'error');
        log(`init() error: ${err.message || err}`, 'le');

        setResult('token', '—', 'N/A', 'info');
        setResult('merchant', '—', 'N/A', 'info');
      }
    };

    script.onerror = () => {
      const latency = Date.now() - cdnStart;
      setResult('sdk-load', '❌', 'CDN فشل في التحميل', 'fail');
      setResult('latency', '❌', `${latency}ms`, 'fail');
      setSdkStatus('❌ فشل تحميل SDK من CDN', 'error');
      log('خطأ: فشل تحميل السكريبت من jsDelivr', 'le');

      setResult('sdk-init', '—', 'N/A', 'info');
      setResult('token', '—', 'N/A', 'info');
      setResult('merchant', '—', 'N/A', 'info');
    };

    // أضف الـ script للصفحة — يبدأ التحميل فوراً
    document.head.appendChild(script);
  </script>

</body>
</html>
